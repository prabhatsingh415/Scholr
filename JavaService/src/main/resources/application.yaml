spring:
  application:
    name: Scholr
  config:
    import: "optional:file:.env[.properties]"
  rabbitmq:
    addresses: ${MESSAGE_BROKER_URL}
  data:
    redis:
      url: ${REDIS_URL}
  h2:
    console:
      enabled: true
      path: /h2
  datasource:
    url: jdbc:h2:mem:scholrdb;DB_CLOSE_DELAY=-1
    driverClassName: org.h2.Driver
    username: sa
    password: password

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect