name: Website Frontend CI

on:
  push:
    branches:
      - website
  pull_request:
    branches:
      - website

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Lint Check
        run: npm run lint

      - name: Run Build
        run: npm run build
        env:
          CI: true
